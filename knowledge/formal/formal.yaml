# Formal knowledge entries — equations, axioms, closed-form laws.
# Used by the GREEN engine.

- id: pythagoras-001
  domain: math
  tags: [geometry, theorem, triangle]
  keywords: [pythagoras, pythagorean, triangle, hypotenuse, right, leg]
  equation: "a**2 + b**2 = c**2"
  variables:
    a: leg of right triangle
    b: leg of right triangle
    c: hypotenuse
  text: |
    Pythagorean theorem: for a right triangle with legs a and b and hypotenuse c,
    a^2 + b^2 = c^2.
  sources: [textbook:euclidean-geometry]

- id: quadratic-formula-001
  domain: math
  tags: [algebra, polynomial, roots]
  keywords: [quadratic, formula, roots, polynomial, discriminant]
  equation: "x = (-b + sqrt(b**2 - 4*a*c)) / (2*a)"
  variables:
    a: coefficient of x^2
    b: coefficient of x
    c: constant term
    x: root
  text: |
    Quadratic formula: the roots of ax^2 + bx + c = 0 are
    x = (-b ± sqrt(b^2 - 4ac)) / (2a).
  sources: [textbook:algebra]

- id: arithmetic-series-001
  domain: math
  tags: [series, sequence, sum]
  keywords: [arithmetic, series, sum, sequence]
  equation: "S = n*(a1 + an)/2"
  variables:
    S: sum of the series
    n: number of terms
    a1: first term
    an: last term
  text: |
    Sum of an arithmetic series: S = n(a_1 + a_n) / 2 where n is the number of terms.
  sources: [textbook:algebra]

- id: geometric-series-001
  domain: math
  tags: [series, sequence, sum]
  keywords: [geometric, series, sum, ratio]
  equation: "S = a*(1 - r**n)/(1 - r)"
  variables:
    S: finite sum
    a: first term
    r: common ratio (r != 1)
    n: number of terms
  text: |
    Sum of a finite geometric series with first term a and common ratio r (r != 1):
    S = a (1 - r^n) / (1 - r).
  sources: [textbook:algebra]

- id: trig-identity-001
  domain: math
  tags: [trigonometry, identity]
  keywords: [trig, trigonometric, identity, sine, cosine]
  equation: "sin(x)**2 + cos(x)**2 = 1"
  variables:
    x: angle in radians
  text: |
    Pythagorean trigonometric identity: sin^2(x) + cos^2(x) = 1 for all real x.
  sources: [textbook:trigonometry]

- id: euler-identity-001
  domain: math
  tags: [complex, identity]
  keywords: [euler, identity, complex, exponential]
  equation: "exp(I*pi) + 1 = 0"
  variables: {}
  text: |
    Euler's identity: e^(i*pi) + 1 = 0 — relates five fundamental constants.
  sources: [textbook:complex-analysis]

- id: newton-second-001
  domain: physics
  tags: [mechanics, force, dynamics]
  keywords: [newton, force, mass, acceleration, second, law]
  equation: "F = m*a"
  variables:
    F: net force (N)
    m: mass (kg)
    a: acceleration (m/s^2)
  text: |
    Newton's second law: the net force on an object equals its mass times its acceleration,
    F = m a.
  sources: [textbook:mechanics]

- id: kinetic-energy-001
  domain: physics
  tags: [mechanics, energy]
  keywords: [kinetic, energy, mass, velocity, motion]
  equation: "E = m*v**2/2"
  variables:
    E: kinetic energy (J)
    m: mass (kg)
    v: speed (m/s)
  text: |
    Kinetic energy of a moving object: E = (1/2) m v^2.
  sources: [textbook:mechanics]

- id: pendulum-period-001
  domain: physics
  tags: [oscillation, pendulum, mechanics]
  keywords: [pendulum, period, oscillation, simple, swing, length]
  equation: "T = 2*pi*sqrt(L/g)"
  variables:
    T: period (s)
    L: length of pendulum (m)
    g: gravitational acceleration (m/s^2)
  defaults:
    g: 9.81
  text: |
    Period of a simple pendulum (small angle approximation): T = 2 pi sqrt(L/g).
  sources: [textbook:mechanics]

- id: hooke-law-001
  domain: physics
  tags: [mechanics, elasticity, spring]
  keywords: [hooke, spring, force, displacement, elastic]
  equation: "F = -k*x"
  variables:
    F: restoring force (N)
    k: spring constant (N/m)
    x: displacement from equilibrium (m)
  text: |
    Hooke's law: an ideal spring exerts a restoring force F = -k x proportional to its
    displacement from equilibrium.
  sources: [textbook:mechanics]

- id: ohm-law-001
  domain: physics
  tags: [electricity, circuit]
  keywords: [ohm, voltage, current, resistance, circuit]
  equation: "V = I*R"
  variables:
    V: voltage (V)
    I: current (A)
    R: resistance (ohm)
  text: |
    Ohm's law: the voltage across a resistor equals the product of its current and
    resistance, V = I R.
  sources: [textbook:electromagnetism]

- id: coulomb-law-001
  domain: physics
  tags: [electricity, electrostatics]
  keywords: [coulomb, charge, force, electrostatic, distance]
  equation: "F = k*q1*q2/r**2"
  variables:
    F: electrostatic force (N)
    k: Coulomb constant ~ 8.99e9 N m^2 / C^2
    q1: first charge (C)
    q2: second charge (C)
    r: separation (m)
  defaults:
    k: 8.99e9
  text: |
    Coulomb's law: the force between two point charges is F = k q1 q2 / r^2 along the
    line joining them.
  sources: [textbook:electromagnetism]

- id: gravitation-001
  domain: physics
  tags: [gravity, mechanics, astronomy]
  keywords: [gravity, gravitational, newton, mass, distance, attraction]
  equation: "F = G*m1*m2/r**2"
  variables:
    F: gravitational force (N)
    G: gravitational constant ~ 6.674e-11 N m^2 / kg^2
    m1: first mass (kg)
    m2: second mass (kg)
    r: separation (m)
  defaults:
    G: 6.674e-11
  text: |
    Newton's law of universal gravitation: F = G m1 m2 / r^2 for two point masses.
  sources: [textbook:mechanics]

- id: kepler-third-001
  domain: physics
  tags: [astronomy, orbit, kepler]
  keywords: [kepler, orbit, period, semi-major, axis, planet]
  equation: "T**2 = (4*pi**2/(G*M))*a**3"
  variables:
    T: orbital period (s)
    G: gravitational constant
    M: mass of central body (kg)
    a: semi-major axis (m)
  defaults:
    G: 6.674e-11
  text: |
    Kepler's third law: T^2 = (4 pi^2 / (G M)) a^3 — the square of the orbital period
    scales with the cube of the semi-major axis.
  sources: [textbook:astronomy]

- id: ideal-gas-001
  domain: physics
  tags: [thermodynamics, gas]
  keywords: [ideal, gas, pressure, volume, temperature, mole]
  equation: "P*V = n*R*T"
  variables:
    P: pressure (Pa)
    V: volume (m^3)
    n: amount of substance (mol)
    R: ideal gas constant ~ 8.314 J/(mol K)
    T: temperature (K)
  defaults:
    R: 8.314
  text: |
    Ideal gas law: P V = n R T relates pressure, volume, amount, and temperature for an
    ideal gas.
  sources: [textbook:thermodynamics]

- id: snell-law-001
  domain: physics
  tags: [optics, refraction]
  keywords: [snell, refraction, optics, light, refractive, index]
  equation: "n1*sin(theta1) = n2*sin(theta2)"
  variables:
    n1: refractive index of medium 1
    n2: refractive index of medium 2
    theta1: angle of incidence
    theta2: angle of refraction
  text: |
    Snell's law: n1 sin(theta1) = n2 sin(theta2) for light crossing a boundary between
    two media of different refractive index.
  sources: [textbook:optics]

- id: wave-speed-001
  domain: physics
  tags: [waves, frequency]
  keywords: [wave, speed, frequency, wavelength]
  equation: "v = f*lam"
  variables:
    v: wave speed (m/s)
    f: frequency (Hz)
    lam: wavelength (m)
  text: |
    Wave relation: the speed of a periodic wave equals frequency times wavelength,
    v = f lambda.
  sources: [textbook:waves]

- id: doppler-classical-001
  domain: physics
  tags: [waves, doppler]
  keywords: [doppler, frequency, source, observer, sound]
  equation: "f_obs = f*(c + v_o)/(c - v_s)"
  variables:
    f_obs: observed frequency
    f: source frequency
    c: wave speed in the medium
    v_o: observer speed toward source
    v_s: source speed toward observer
  text: |
    Classical Doppler shift (toward-motion sign convention):
    f_observed = f (c + v_o) / (c - v_s).
  sources: [textbook:waves]

- id: mass-energy-001
  domain: physics
  tags: [relativity, energy]
  keywords: [einstein, mass, energy, equivalence, relativity, rest]
  equation: "E = m*c**2"
  variables:
    E: rest energy (J)
    m: rest mass (kg)
    c: speed of light in vacuum (m/s)
  defaults:
    c: 2.998e8
  text: |
    Einstein's mass-energy equivalence: the rest energy of a body equals its rest mass
    times the speed of light squared, E = m c^2.
  sources: [textbook:special-relativity]

- id: schrodinger-ti-001
  domain: physics
  tags: [quantum, eigenvalue]
  keywords: [schrodinger, quantum, eigenvalue, hamiltonian, wavefunction]
  equation: "H*psi = E*psi"
  variables:
    H: Hamiltonian operator
    psi: wavefunction (eigenstate)
    E: energy eigenvalue
  text: |
    Time-independent Schrödinger equation: H psi = E psi — the Hamiltonian acting on a
    stationary state returns the same state scaled by its energy eigenvalue.
  sources: [textbook:quantum-mechanics]

# ---------- chemistry ----------

- id: henderson-hasselbalch-001
  domain: chemistry
  tags: [acid, base, ph, buffer]
  keywords: [henderson, hasselbalch, ph, pka, buffer, acid, base]
  equation: "pH = pKa + log10(A/HA)"
  variables:
    pH: pH of the buffer
    pKa: acid dissociation constant (negative log)
    A: concentration of conjugate base (mol/L)
    HA: concentration of weak acid (mol/L)
  text: |
    Henderson-Hasselbalch equation: pH = pKa + log10([A-]/[HA]) — used to estimate the
    pH of a buffer solution from the ratio of conjugate base to weak acid.
  sources: [textbook:chemistry]

- id: beer-lambert-001
  domain: chemistry
  tags: [spectroscopy, absorbance]
  keywords: [beer, lambert, absorbance, concentration, spectroscopy]
  equation: "A = e*c*l"
  variables:
    A: absorbance
    e: molar absorptivity (L/(mol cm))
    c: concentration (mol/L)
    l: path length (cm)
  text: |
    Beer-Lambert law: A = e c l — absorbance is proportional to molar absorptivity,
    concentration of the absorbing species, and the path length of the light through
    the sample.
  sources: [textbook:analytical-chemistry]

- id: equilibrium-constant-001
  domain: chemistry
  tags: [equilibrium, kinetics]
  keywords: [equilibrium, constant, reaction, products, reactants]
  equation: "K = P/R"
  variables:
    K: equilibrium constant
    P: product activity (or concentration)
    R: reactant activity (or concentration)
  text: |
    For a reaction at equilibrium aA + bB <=> cC + dD, the equilibrium constant
    K = ([C]^c [D]^d) / ([A]^a [B]^b). The simplified form K = P / R captures the
    products-over-reactants structure for symmetric one-to-one reactions.
  sources: [textbook:chemistry]

- id: avogadro-mole-001
  domain: chemistry
  tags: [mole, count]
  keywords: [avogadro, mole, particles, molecules]
  equation: "N = n*Na"
  variables:
    N: number of particles
    n: amount of substance (mol)
    Na: Avogadro's number ~ 6.022e23
  defaults:
    Na: 6.022e23
  text: |
    Avogadro's law of counting: the number of particles N in n moles of any substance
    is N = n * 6.022e23, since one mole always contains Avogadro's number of entities.
  sources: [textbook:chemistry]

# ---------- statistics & probability ----------

- id: arithmetic-mean-001
  domain: math
  tags: [statistics, average]
  keywords: [mean, average, arithmetic, expected]
  equation: "mu = S/n"
  variables:
    mu: arithmetic mean
    S: sum of all values
    n: number of values
  text: |
    The arithmetic mean of n values is mu = (sum of values) / n. It is the most common
    measure of central tendency for numerical data.
  sources: [textbook:statistics]

- id: variance-001
  domain: math
  tags: [statistics, dispersion]
  keywords: [variance, deviation, dispersion]
  equation: "sigma2 = SS/n"
  variables:
    sigma2: population variance
    SS: sum of squared deviations from the mean
    n: number of values
  text: |
    Population variance: sigma^2 = (1/n) sum_i (x_i - mu)^2. It measures how far
    individual observations spread from the mean.
  sources: [textbook:statistics]

- id: stddev-001
  domain: math
  tags: [statistics, dispersion]
  keywords: [standard, deviation, sigma, spread]
  equation: "sigma = sqrt(sigma2)"
  variables:
    sigma: standard deviation
    sigma2: variance
  text: |
    Standard deviation is the square root of variance, sigma = sqrt(sigma^2). Same
    units as the original data, which makes it easier to interpret.
  sources: [textbook:statistics]

- id: zscore-001
  domain: math
  tags: [statistics, standardize]
  keywords: [zscore, standardize, normal]
  equation: "z = (x - mu)/sigma"
  variables:
    z: standard score
    x: observation
    mu: mean
    sigma: standard deviation
  text: |
    Z-score: z = (x - mu) / sigma — expresses how many standard deviations an
    observation lies above or below the mean.
  sources: [textbook:statistics]

- id: bayes-theorem-001
  domain: math
  tags: [probability, inference]
  keywords: [bayes, posterior, prior, conditional]
  equation: "P_AB = P_BA*P_A/P_B"
  variables:
    P_AB: posterior P(A|B)
    P_BA: likelihood P(B|A)
    P_A: prior P(A)
    P_B: marginal P(B)
  text: |
    Bayes' theorem: P(A|B) = P(B|A) P(A) / P(B). It updates the prior probability of
    A in light of evidence B and is the core engine of Bayesian inference.
  sources: [textbook:probability]

- id: correlation-001
  domain: math
  tags: [statistics, association]
  keywords: [correlation, pearson, association, r]
  equation: "r = covXY/(sigmaX*sigmaY)"
  variables:
    r: Pearson correlation coefficient
    covXY: covariance of X and Y
    sigmaX: standard deviation of X
    sigmaY: standard deviation of Y
  text: |
    Pearson correlation: r = cov(X, Y) / (sigma_X sigma_Y). It measures the strength
    and direction of a linear relationship; r in [-1, 1].
  sources: [textbook:statistics]

- id: log-change-base-001
  domain: math
  tags: [logarithm, identity]
  keywords: [logarithm, change, base, log]
  equation: "y = log(x)/log(b)"
  variables:
    y: log_b(x), the result we want
    x: argument
    b: target base
  text: |
    Change of base for logarithms: log_b(x) = log_a(x) / log_a(b). Lets you compute
    a logarithm in any base using the natural log or base-10 log on a calculator.
  sources: [textbook:algebra]

- id: exp-decay-001
  domain: physics
  tags: [decay, radiation]
  keywords: [exponential, decay, radioactive, half, life]
  equation: "N = N0*exp(-lam*t)"
  variables:
    N: amount remaining at time t
    N0: initial amount
    lam: decay constant (1/s)
    t: time (s)
  text: |
    Exponential decay: N(t) = N_0 e^(-lambda t). Describes radioactive decay, capacitor
    discharge, and any first-order rate process where the rate is proportional to the
    amount present.
  sources: [textbook:physics]

# ---------- physics extras ----------

- id: half-life-001
  domain: physics
  tags: [decay, radiation]
  keywords: [half, life, halflife, decay, lambda]
  equation: "thalf = log(2)/lam"
  variables:
    thalf: half-life (s)
    lam: decay constant (1/s)
  text: |
    Half-life: t_1/2 = ln(2) / lambda. The time for half of the initial population to
    decay in a first-order process.
  sources: [textbook:physics]

- id: heat-capacity-001
  domain: physics
  tags: [thermodynamics, heat]
  keywords: [heat, capacity, specific, temperature, energy]
  equation: "Q = m*c*dT"
  variables:
    Q: heat energy (J)
    m: mass (kg)
    c: specific heat capacity (J/(kg K))
    dT: temperature change (K)
  text: |
    Heat needed to change the temperature of a mass: Q = m c dT, where c is the
    specific heat capacity of the substance.
  sources: [textbook:thermodynamics]

- id: electric-power-001
  domain: physics
  tags: [electricity, power]
  keywords: [power, electric, voltage, current, watt]
  equation: "P = V*I"
  variables:
    P: electrical power (W)
    V: voltage (V)
    I: current (A)
  text: |
    Electrical power: P = V I — the rate at which a circuit element converts electrical
    energy. For ohmic loads this also equals I^2 R or V^2 / R.
  sources: [textbook:electromagnetism]

- id: lens-equation-001
  domain: physics
  tags: [optics, lens]
  keywords: [lens, focal, length, object, image, thin]
  equation: "1/f = 1/u + 1/v"
  variables:
    f: focal length (m)
    u: object distance (m)
    v: image distance (m)
  text: |
    Thin lens equation: 1/f = 1/u + 1/v relates focal length, object distance, and
    image distance for a thin converging or diverging lens.
  sources: [textbook:optics]

# ---------- finance / economics ----------

- id: future-value-001
  domain: economics
  tags: [finance, time-value]
  keywords: [future, value, compound, interest, fv]
  equation: "FV = PV*(1 + r)**n"
  variables:
    FV: future value
    PV: present value
    r: per-period interest rate (decimal)
    n: number of periods
  text: |
    Future value with compound interest: FV = PV (1 + r)^n. Tells you how much an
    investment of PV grows to after n compounding periods at rate r.
  sources: [textbook:finance]

- id: present-value-001
  domain: economics
  tags: [finance, time-value]
  keywords: [present, value, discount, pv]
  equation: "PV = FV/(1 + r)**n"
  variables:
    PV: present value
    FV: future cash flow
    r: per-period discount rate (decimal)
    n: number of periods
  text: |
    Present value: PV = FV / (1 + r)^n. The amount that a future cash flow FV is worth
    today after discounting at rate r over n periods.
  sources: [textbook:finance]

- id: compound-interest-formula-001
  domain: economics
  tags: [finance, interest]
  keywords: [compound, interest, principal, rate, compounding]
  equation: "A = P*(1 + r/k)**(k*t)"
  variables:
    A: ending balance
    P: principal
    r: nominal annual rate (decimal)
    k: compounding periods per year
    t: years
  text: |
    Compound interest with k compounding periods per year: A = P (1 + r/k)^(k t).
    As k -> infinity this approaches A = P e^(r t) (continuous compounding).
  sources: [textbook:finance]

- id: net-present-value-001
  domain: economics
  tags: [finance, valuation]
  keywords: [npv, present, value, cash, flow, investment]
  equation: "NPV = CF/(1 + r)**t - C0"
  variables:
    NPV: net present value
    CF: cash flow at time t
    r: per-period discount rate
    t: time period
    C0: initial investment
  text: |
    Net present value of a single future cash flow: NPV = CF / (1 + r)^t - C0. For a
    series of cash flows, sum the discounted values and subtract the initial outlay.
    Positive NPV means the project adds value.
  sources: [textbook:corporate-finance]
