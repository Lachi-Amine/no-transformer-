# Interpretive knowledge entries — perspectives on contested questions.
# Used by the RED engine to synthesize multi-tradition responses.
# Six topics, three traditions each.

# ---------- topic: trolley_problem ----------

- id: trolley-utilitarian-001
  domain: philosophy
  topic: trolley_problem
  tradition: utilitarian
  tags: [ethics, dilemma, consequentialism]
  keywords: [trolley, problem, dilemma, kill, save, divert, lever, track]
  text: |
    The utilitarian answer pulls the lever: if diverting the trolley kills one person
    instead of five, the action that produces the greatest aggregate wellbeing is
    chosen, regardless of the agent's role in causing the death.
  sources: [singer:practical-ethics]

- id: trolley-deontological-001
  domain: philosophy
  topic: trolley_problem
  tradition: deontological
  tags: [ethics, dilemma, kant]
  keywords: [trolley, problem, dilemma, kill, save, divert, lever, track]
  text: |
    The deontological answer rejects using a person as a mere means, even to save
    others; intentionally killing the one to redirect the trolley violates a duty
    that is not outweighed by aggregate consequences.
  sources: [kant:groundwork]

- id: trolley-virtue-001
  domain: philosophy
  topic: trolley_problem
  tradition: virtue
  tags: [ethics, dilemma, character]
  keywords: [trolley, problem, dilemma, kill, save, divert, lever, track]
  text: |
    The virtue ethics answer asks what a person of practical wisdom and good
    character would do in this situation, attending to compassion, courage, and the
    moral weight of being the agent of harm rather than to a single decision rule.
  sources: [aristotle:nicomachean-ethics]

# ---------- topic: capital_punishment ----------

- id: capital-utilitarian-001
  domain: philosophy
  topic: capital_punishment
  tradition: utilitarian
  tags: [ethics, justice, deterrence]
  keywords: [capital, punishment, death, penalty, execution, deterrence, justice]
  text: |
    Utilitarians evaluate capital punishment by its consequences — does it deter
    crime, reduce suffering, or efficiently use justice resources? — and most
    contemporary utilitarian arguments judge it unjustified given weak deterrence
    evidence and the risk of executing innocents.
  sources: [bentham:rationale-of-punishment]

- id: capital-deontological-001
  domain: philosophy
  topic: capital_punishment
  tradition: deontological
  tags: [ethics, justice, retribution]
  keywords: [capital, punishment, death, penalty, execution, retribution, justice]
  text: |
    Deontological positions split: classical retributivists argue that severe
    wrongdoers deserve a proportionate response and that justice itself can require
    execution, while modern Kantians argue that the inviolable dignity of the person
    forbids the state from taking life as punishment.
  sources: [kant:metaphysics-of-morals]

- id: capital-virtue-001
  domain: philosophy
  topic: capital_punishment
  tradition: virtue
  tags: [ethics, justice, character]
  keywords: [capital, punishment, death, penalty, execution, character, justice]
  text: |
    Virtue ethics emphasizes what executing a person says about the political
    community's character and what it cultivates in those who carry it out, weighing
    institutional callousness, mercy, and the conditions for human flourishing
    against demands for retribution.
  sources: [macintyre:after-virtue]

# ---------- topic: lying ----------

- id: lying-utilitarian-001
  domain: philosophy
  topic: lying
  tradition: utilitarian
  tags: [ethics, honesty, truth]
  keywords: [lying, lie, deception, honesty, truth, telling]
  text: |
    Utilitarians treat lying as instrumentally bad in most cases because it erodes
    trust and welfare, but they allow lies that produce a net gain in wellbeing,
    such as misleading a would-be murderer about the location of their target.
  sources: [mill:utilitarianism]

- id: lying-deontological-001
  domain: philosophy
  topic: lying
  tradition: deontological
  tags: [ethics, honesty, kant]
  keywords: [lying, lie, deception, honesty, truth, telling]
  text: |
    The strict Kantian view holds that lying violates a perfect duty and cannot be
    universalized: even to save a life one must not lie, because deception treats a
    rational agent as an object to be manipulated rather than a person to be
    addressed.
  sources: [kant:on-a-supposed-right-to-lie]

- id: lying-virtue-001
  domain: philosophy
  topic: lying
  tradition: virtue
  tags: [ethics, honesty, character]
  keywords: [lying, lie, deception, honesty, truth, telling]
  text: |
    Virtue ethics asks what a truthful and prudent person would do; honesty is a
    central excellence of character, but practical wisdom recognizes contexts —
    protecting an innocent, sparing unnecessary cruelty — in which strict candor
    fails to honor the goods that truthfulness exists to serve.
  sources: [aristotle:nicomachean-ethics]

# ---------- topic: income_inequality ----------

- id: inequality-libertarian-001
  domain: philosophy
  topic: income_inequality
  tradition: libertarian
  tags: [politics, economics, justice]
  keywords: [income, inequality, wealth, redistribution, taxation, freedom, justice]
  text: |
    The libertarian view (Nozick) holds that a distribution is just if it arose
    through legitimate acquisition and voluntary exchange. On this account,
    inequality per se is not unjust, and forced redistribution by the state violates
    the property rights of those it taxes.
  sources: [nozick:anarchy-state-utopia]

- id: inequality-egalitarian-001
  domain: philosophy
  topic: income_inequality
  tradition: egalitarian
  tags: [politics, economics, justice]
  keywords: [income, inequality, wealth, redistribution, fairness, justice, rawls]
  text: |
    The egalitarian view (Rawls) argues that inequalities are justified only if they
    benefit the worst-off members of society. Substantial gaps in income that do not
    improve the condition of the least advantaged fail the difference principle and
    call for redistribution.
  sources: [rawls:theory-of-justice]

- id: inequality-communitarian-001
  domain: philosophy
  topic: income_inequality
  tradition: communitarian
  tags: [politics, economics, community]
  keywords: [income, inequality, wealth, community, solidarity, common, good]
  text: |
    The communitarian view evaluates inequality by its effects on shared civic life:
    extreme gaps erode the common goods of trust, deliberation, and solidarity, so
    distribution should be judged by whether it sustains the political community
    rather than by individual rights or aggregate welfare alone.
  sources: [sandel:democracys-discontent]

# ---------- topic: ai_consciousness ----------

- id: ai-functionalist-001
  domain: philosophy
  topic: ai_consciousness
  tradition: functionalist
  tags: [philosophy-of-mind, ai, consciousness]
  keywords: [ai, artificial, intelligence, consciousness, mind, sentience, machine]
  text: |
    Functionalism holds that mental states are constituted by their causal-functional
    roles. On this view, an AI that implements the right pattern of inputs, internal
    states, and outputs would have genuine mental states, regardless of whether the
    substrate is silicon or neurons.
  sources: [putnam:nature-of-mental-states]

- id: ai-biological-naturalism-001
  domain: philosophy
  topic: ai_consciousness
  tradition: biological_naturalism
  tags: [philosophy-of-mind, ai, consciousness]
  keywords: [ai, artificial, intelligence, consciousness, mind, sentience, machine]
  text: |
    Biological naturalism (Searle) argues that consciousness is caused by specific
    biological processes of the brain, so a digital computer running a program — no
    matter how sophisticated — only simulates understanding without producing the
    causal powers that yield genuine mind.
  sources: [searle:minds-brains-programs]

- id: ai-dualist-001
  domain: philosophy
  topic: ai_consciousness
  tradition: dualist
  tags: [philosophy-of-mind, ai, consciousness]
  keywords: [ai, artificial, intelligence, consciousness, mind, sentience, soul]
  text: |
    Substance dualism takes mind and body to be metaphysically distinct kinds. On
    this view, no purely physical system — biological or artificial — can host
    consciousness on its own; an irreducible non-physical mind would be required for
    a machine to be genuinely conscious.
  sources: [descartes:meditations]

# ---------- topic: free_will ----------

- id: freewill-compatibilist-001
  domain: philosophy
  topic: free_will
  tradition: compatibilist
  tags: [metaphysics, agency, determinism]
  keywords: [free, will, determinism, agency, choice, responsibility, compatibilism]
  text: |
    Compatibilism holds that free will is consistent with determinism. To act freely
    is to act in accordance with one's own reasons and desires without external
    coercion; whether prior causes fixed those reasons is irrelevant to the moral
    question of responsibility.
  sources: [frankfurt:freedom-of-the-will]

- id: freewill-hard-determinist-001
  domain: philosophy
  topic: free_will
  tradition: hard_determinist
  tags: [metaphysics, agency, determinism]
  keywords: [free, will, determinism, agency, choice, responsibility]
  text: |
    Hard determinists argue that if every event is determined by prior causes, then
    no one could have done otherwise, and the libertarian sense of free will is an
    illusion. Moral responsibility, on this view, must be revised or abandoned.
  sources: [pereboom:living-without-free-will]

- id: freewill-libertarian-001
  domain: philosophy
  topic: free_will
  tradition: libertarian_freewill
  tags: [metaphysics, agency, indeterminism]
  keywords: [free, will, libertarian, indeterminism, agency, choice]
  text: |
    Libertarian free will (in the metaphysical sense, distinct from political
    libertarianism) maintains that agents can be the genuine ultimate source of at
    least some of their actions. This typically requires either indeterminism in the
    causal chain or a special form of agent causation.
  sources: [kane:significance-of-free-will]

# ---------- topic: immigration ----------

- id: immigration-utilitarian-001
  domain: philosophy
  topic: immigration
  tradition: utilitarian
  tags: [politics, ethics]
  keywords: [immigration, migration, borders, refugee, welfare]
  text: |
    The utilitarian calculation on immigration weighs the substantial welfare gains
    to migrants and host-country consumers against possible wage pressure on
    competing native workers and short-run fiscal costs. Most empirical reviews
    conclude open or expanded migration is welfare-maximizing in aggregate.
  sources: [clemens:economics-and-emigration]

- id: immigration-libertarian-001
  domain: philosophy
  topic: immigration
  tradition: libertarian
  tags: [politics, freedom]
  keywords: [immigration, migration, borders, freedom, movement]
  text: |
    The libertarian view treats freedom of movement and voluntary association as
    presumptive rights — denying a person work or residence based on birthplace is
    a coercive act that requires extraordinary justification. Borders, on this view,
    should be largely open absent specific harms.
  sources: [carens:case-for-open-borders]

- id: immigration-communitarian-001
  domain: philosophy
  topic: immigration
  tradition: communitarian
  tags: [politics, community]
  keywords: [immigration, migration, borders, community, identity]
  text: |
    Communitarians argue that political communities are constituted by shared
    histories, languages, and civic practices, and that they retain a legitimate
    interest in regulating membership. Immigration policy should therefore balance
    humanitarian duties with the community's capacity to integrate newcomers and
    sustain its collective life.
  sources: [walzer:spheres-of-justice]

# ---------- topic: animal_rights ----------

- id: animal-utilitarian-001
  domain: philosophy
  topic: animal_rights
  tradition: utilitarian
  tags: [ethics, animals]
  keywords: [animal, rights, welfare, sentience, suffering, speciesism]
  text: |
    The utilitarian case (Peter Singer) is grounded in equal consideration of
    interests: if an animal is sentient and capable of suffering, its suffering
    counts morally. Practices like factory farming impose enormous suffering for
    marginal human benefit and so are unjustified.
  sources: [singer:animal-liberation]

- id: animal-deontological-001
  domain: philosophy
  topic: animal_rights
  tradition: deontological
  tags: [ethics, animals, rights]
  keywords: [animal, rights, regan, subjects, life, inherent, value]
  text: |
    Tom Regan's rights view holds that mammals are subjects-of-a-life with inherent
    value and so possess basic moral rights — not to be treated merely as resources.
    Their rights cannot be overridden by aggregate human welfare; using them in
    research, food production, or entertainment is therefore wrong in principle.
  sources: [regan:case-for-animal-rights]

- id: animal-virtue-001
  domain: philosophy
  topic: animal_rights
  tradition: virtue
  tags: [ethics, animals, character]
  keywords: [animal, rights, character, compassion, virtue, ethics]
  text: |
    Virtue-ethical accounts ask what a person of good character would do toward
    creatures dependent on us — emphasizing compassion, gratitude, and the moral
    importance of how cruelty habituates us. The wrongness of factory farming on
    this view lies in the kind of agents and societies the practice produces.
  sources: [hursthouse:applying-virtue-ethics]

# ---------- topic: distributive_justice ----------

- id: distributive-libertarian-001
  domain: philosophy
  topic: distributive_justice
  tradition: libertarian
  tags: [politics, justice, property]
  keywords: [distributive, justice, libertarian, nozick, property, entitlement]
  text: |
    Nozick's entitlement theory takes a distribution to be just if and only if it
    arose by just acquisition and just transfer. Patterned distributions — to each
    according to need, merit, or equality — necessarily violate liberty because
    they require ongoing redistribution of legitimately-held holdings.
  sources: [nozick:anarchy-state-utopia]

- id: distributive-egalitarian-001
  domain: philosophy
  topic: distributive_justice
  tradition: egalitarian
  tags: [politics, justice, fairness]
  keywords: [distributive, justice, rawls, difference, principle, equality]
  text: |
    Rawls's difference principle holds that social and economic inequalities are
    just only insofar as they are arranged to benefit the least advantaged. Behind
    a veil of ignorance, rational parties would choose this principle to secure
    fair shares without knowing where they will land in the distribution.
  sources: [rawls:theory-of-justice]

- id: distributive-communitarian-001
  domain: philosophy
  topic: distributive_justice
  tradition: communitarian
  tags: [politics, justice, community]
  keywords: [distributive, justice, communitarian, sphere, social, meaning]
  text: |
    Walzer's pluralist account argues that different goods — money, healthcare,
    citizenship, education — belong to different distributive spheres governed by
    different principles, drawn from the social meanings of those goods within a
    particular community. Justice is preventing dominance of one sphere over
    another, not imposing a single pattern.
  sources: [walzer:spheres-of-justice]

# ---------- topic: privacy ----------

- id: privacy-libertarian-001
  domain: philosophy
  topic: privacy
  tradition: libertarian
  tags: [politics, privacy, autonomy]
  keywords: [privacy, surveillance, autonomy, freedom, data]
  text: |
    The libertarian view treats privacy as a corollary of self-ownership and
    contract. Surveillance, mandated data sharing, and pre-emptive monitoring are
    intrusions on autonomy that require strong justification; voluntary consent
    is what legitimates data collection, not promises of public benefit.
  sources: [posner:economics-of-privacy]

- id: privacy-communitarian-001
  domain: philosophy
  topic: privacy
  tradition: communitarian
  tags: [politics, privacy, community]
  keywords: [privacy, surveillance, public, accountability, community]
  text: |
    The communitarian view balances privacy against the goods of accountability,
    public health, and trust. Excessive privacy can shield wrongdoing and corrode
    civic life; legitimate surveillance for shared purposes — public safety,
    preventing fraud — has a place provided it is transparent and proportionate.
  sources: [etzioni:limits-of-privacy]

- id: privacy-utilitarian-001
  domain: philosophy
  topic: privacy
  tradition: utilitarian
  tags: [politics, privacy, welfare]
  keywords: [privacy, surveillance, welfare, harm, utility]
  text: |
    The utilitarian view evaluates privacy regimes by their consequences:
    chilling effects on speech and innovation, the welfare losses of identity
    theft, and the gains from targeted services and security. The optimum is
    rarely all-or-nothing, calling for context-dependent rules that maximize
    aggregate wellbeing.
  sources: [solove:nothing-to-hide]

# ---------- topic: war ----------

- id: war-just-war-001
  domain: philosophy
  topic: war
  tradition: just_war
  tags: [ethics, war, jus]
  keywords: [war, just, jus, bellum, augustine, aquinas, proportionality]
  text: |
    Just war theory, articulated from Augustine and Aquinas through modern
    formulations, sets criteria for both going to war (jus ad bellum) — just
    cause, legitimate authority, last resort, proportionality — and conduct in
    war (jus in bello) — discrimination between combatants and civilians and
    proportional means.
  sources: [walzer:just-and-unjust-wars]

- id: war-pacifist-001
  domain: philosophy
  topic: war
  tradition: pacifist
  tags: [ethics, war, nonviolence]
  keywords: [war, pacifism, nonviolence, gandhi, conscientious]
  text: |
    Pacifism holds that organized killing in war is morally impermissible. Strict
    versions reject all violence; contingent pacifists argue that modern war's
    technologies and politics make any prospective war unjust in fact, even if
    war could be permissible in principle.
  sources: [gandhi:nonviolent-resistance]

- id: war-realist-001
  domain: philosophy
  topic: war
  tradition: realist
  tags: [ethics, war, statecraft]
  keywords: [war, realism, statecraft, security, hobbes, machiavelli]
  text: |
    Political realism takes states to inhabit an anarchic system in which moral
    categories applied to individuals do not transfer cleanly to international
    relations. Statecraft, including the use of force, is judged primarily by
    prudence and the survival and security interests of the state.
  sources: [morgenthau:politics-among-nations]

# ---------- topic: religious_freedom ----------

- id: religion-libertarian-001
  domain: philosophy
  topic: religious_freedom
  tradition: libertarian
  tags: [politics, religion, freedom]
  keywords: [religious, freedom, liberty, conscience, exemption]
  text: |
    The libertarian view treats religious practice as a free expression of
    conscience that the state must not coerce or favor. It defends both broad
    religious-exemption claims and a strict limit on state involvement: the
    state may neither establish a religion nor punish its peaceful practice.
  sources: [locke:letter-on-toleration]

- id: religion-communitarian-001
  domain: philosophy
  topic: religious_freedom
  tradition: communitarian
  tags: [politics, religion, community]
  keywords: [religious, freedom, community, tradition, public]
  text: |
    Communitarians stress that religious traditions are constitutive sources of
    moral identity for their adherents and for political communities. Religious
    freedom should protect not only individual conscience but also the capacity
    of religious communities to sustain their practices and shape their
    institutions, balanced against shared civic commitments.
  sources: [sandel:liberalism-and-the-limits-of-justice]

- id: religion-secular-001
  domain: philosophy
  topic: religious_freedom
  tradition: secular
  tags: [politics, religion, secularism]
  keywords: [religious, freedom, secular, separation, public, reason]
  text: |
    The secular-liberal view defends religious freedom while insisting that
    public reasons given in political deliberation be accessible to citizens of
    all faiths and none. Religiously grounded conscience claims may exempt
    individuals, but state action and shared civic discourse should rest on
    public reasons rather than sectarian doctrine.
  sources: [rawls:political-liberalism]
